---
name: Zwift Updater
'on':
  workflow_call:
    inputs:
      git_branch:
        required: true
        type: string
      dockerhub_image:
        required: true
        type: string
    secrets:
      dockerhub_username:
        required: true
      dockerhub_token:
        required: true
jobs:
  zwift_updater:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    steps:
    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.dockerhub_username }}
        password: ${{ secrets.dockerhub_token }}
    - name: Install dependencies
      run: sudo apt-get install -y x11-xserver-utils x11-apps
    - uses: netbrain/free-disk-space-action@v0.0.1
    - name: Check for zwift update
      run: |
        export DISPLAY=":99"

        version="$(curl -s http://cdn.zwift.com/gameassets/Zwift_Updates_Root/Zwift_ver_cur.xml \
            | grep -oP 'sversion="\K.*?(?=")' | cut -f 1 -d ' ')"
        build_date="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

        tag="latest"
        tag_pattern="^[0-9]+\.[0-9]+\.[0-9]+$"
        if [[ ${{ inputs.git_branch }} != "master" ]]; then
            tag="${{ inputs.git_branch }}"
            tag_pattern="^[0-9]+\.[0-9]+\.[0-9]+-${{ inputs.git_branch }}$"
            version="${version}-${{ inputs.git_branch }}"
        fi

        tags="$(curl -s "https://hub.docker.com/v2/repositories/${{ inputs.dockerhub_image }}/tags/?page_size=100")"
        tag_count="$(echo "${tags}" | jq -r ".count")"

        tag_found=0
        image_version=""
        for i in $(seq 0 "$((tag_count - 1))"); do
            image_version="$(echo "${tags}" | jq -r ".results[${i}].name")"
            if [[ ${image_version} =~ ${tag_pattern} ]]; then
                tag_found=1
                break
            fi
        done
        if [[ ${tag_found} -ne 1 ]]; then
            echo "::error::No image found for '${{ inputs.dockerhub_image }}:${tag}', can't update!"
            exit 1
        fi

        echo "Latest Zwift version is: ${version}"
        echo "Latest image version is: ${image_version}"

        if [[ ${image_version} == "${version}" ]]; then
            echo "Nothing to do, image already has latest Zwift version"
            exit 0
        fi

        echo "Starting update..."

        Xvfb "${DISPLAY}" -ac -screen 0 "800x600x24" -nolisten tcp &
        sleep 3

        xhost +
        docker run \
            --name zwift \
            -e DISPLAY="${DISPLAY}" \
            -e CONTAINER_TOOL="docker" \
            --device="/dev/dri:/dev/dri" \
            -v /tmp/.X11-unix:/tmp/.X11-unix \
            "${{ inputs.dockerhub_image }}:${tag}" \
            --update

        docker commit \
            --change="LABEL org.opencontainers.image.created=${build_date}" \
            --change="LABEL org.opencontainers.image.version=${version}" \
            --change='CMD [""]' \
            -m "updated to version ${version}" \
            zwift \
            "${{ inputs.dockerhub_image }}:${version}"

        docker tag "${{ inputs.dockerhub_image }}:${version}" "${{ inputs.dockerhub_image }}:${tag}"
        docker push "${{ inputs.dockerhub_image }}:${version}"
        docker push "${{ inputs.dockerhub_image }}:${tag}"
