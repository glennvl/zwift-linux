---
name: Zwift build from scratch
'on':
  workflow_call:
    inputs:
      git_branch:
        required: true
        type: string
      dockerhub_image:
        required: true
        type: string
    secrets:
      github_token:
        required: true
      dockerhub_username:
        required: true
      dockerhub_token:
        required: true
jobs:
  zwift_build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.dockerhub_username }}
        password: ${{ secrets.dockerhub_token }}
    - name: Install dependencies
      run: sudo apt-get install -y x11-xserver-utils x11-apps
    - uses: netbrain/free-disk-space-action@v0.0.1
    - name: Checkout
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.git_branch }}
        token: ${{ secrets.github_token }}
    - name: Build zwift
      run: |
        export DISPLAY=":99"

        version="$(curl -s http://cdn.zwift.com/gameassets/Zwift_Updates_Root/Zwift_ver_cur.xml \
            | grep -oP 'sversion="\K.*?(?=")' | cut -f 1 -d ' ')"
        build_date="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

        tag="latest"
        if [[ ${{ inputs.git_branch }} != "master" ]]; then
            tag="${{ inputs.git_branch }}"
            version="${version}-${{ inputs.git_branch }}"
        fi

        echo "Starting build..."

        Xvfb "${DISPLAY}" -ac -screen 0 "800x600x24" -nolisten tcp &
        sleep 3

        docker build -t "${{ inputs.dockerhub_image }}:build" src/

        xhost +
        docker run \
            --name zwift \
            -e DISPLAY="${DISPLAY}" \
            -e CONTAINER_TOOL="docker" \
            --device="/dev/dri:/dev/dri" \
            -v /tmp/.X11-unix:/tmp/.X11-unix \
            "${{ inputs.dockerhub_image }}:build"

        docker commit \
            --change="LABEL org.opencontainers.image.created=${build_date}" \
            --change="LABEL org.opencontainers.image.version=${version}" \
            --change='CMD [""]' \
            -m "built from scratch from version ${version}" \
            zwift \
            "${{ inputs.dockerhub_image }}:${version}"

        docker tag "${{ inputs.dockerhub_image }}:${version}" "${{ inputs.dockerhub_image }}:${tag}"
        docker push "${{ inputs.dockerhub_image }}:${version}"
        docker push "${{ inputs.dockerhub_image }}:${tag}"
